<!-- pseudo class selectors: selector:classname{} 
    a:link
    a:visited
    a:hover
    a:active
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a:link {
            color: red;
        }

        a:visited {
            color: blue;
        }

        a:hover {
            color: green;
        }

        a:active {
            color: orange;
        }

        img {
            height: 250px;
            opacity: 0.5;
        }

        img:hover {
            opacity: 1 ;
        }
    </style>
</head>

<body>
    <a href="https://google.com">google</a>
    <img src="https://photographylife.com/wp-content/uploads/2023/05/Nikon-Z8-Official-Samples-00002.jpg" alt="">
</body>

</html>
