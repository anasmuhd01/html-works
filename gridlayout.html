<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            background-color: lightblue;
            height: 100vh;
            display: grid;
            
            grid-template-columns: 2fr 3fr 1fr;


            grid-template-areas:
                'header header header'
            ;

        }

        .grid-item {
            background-color: lightcoral;
            border: 1px solid black;

        }

        #d1 {
            grid-area: header;
        }

        #d2 {
            grid-area: sidebar;
        }

        #d3 {
            grid-area: article;
        }

        #d4 {
            grid-area: navbar;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="grid-item" id="d1">1</div>
        <div class="grid-item" id="d2">2</div>
        <div class="grid-item" id="d3">3</div>
        <div class="grid-item" id="d4">4</div>
        <!-- <div class="grid-item" id="d5">5</div> -->
    </div>
</body>

</html>
