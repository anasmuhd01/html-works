<!-- CSS selectors:

1.simple selector : element selector,class selector, id selctor
2.combinators-
    -desendant selector (space)
    -child selector (>)
    -adjacent sibling selector (+)
    -general sibling selector (~)

-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            height: 250px;
            width: 250px;
            background-color: lightblue;
        }

        div h1 {
            color: lightcoral;
        }
    </style>
</head>

<body>
    <div class="box1">
        <h1>heading 1</h1>
        <h1>heading 2</h1>
        <span>
            <h1>heading 3</h1>

        </span>

    </div>
    <h1>heading 4</h1>
    <h1>heading 5</h1>
    <div class="box2">
        <h1>heading 6</h1>
        <h1>heading 7</h1>

    </div>

</body>

</html>
