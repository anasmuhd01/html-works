<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>unorderd list</h2>
    <ul style="list-style-type: disc;">
        <li>one</li>
        <li>two</li>
        <li>three</li>
    </ul>
    <h2>orderd list</h2>
    <ol>
        <li>one</li>
        <li>two</li>
        <li>three</li>
    </ol>
    <dl>
        <dt>cofee</dt>
        <dd>brown color</dd>
        <dt>milk</dt>
        <dd>white color</dd>
    </dl>
</body>

</html>
