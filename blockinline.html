<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #d1 {
            background-color: lightblue;
            height: 300px;
            width: 300px;
            display: inline;
        }

        #s1 {
            background-color: lightcoral;
            display: block;
            height: 300px;
            width: 300px;
        }

        #s2 {
            background-color: lightblue;
            display: inline-block;
            height: 300px;
            width: 300px;

        }
    </style>
</head>

<body>
    <div id="d1">
        div
    </div>
    <span id="s1">
        span
    </span>
    <span id="s2">
        inline block
    </span>
    <a href="">inline link</a>
</body>

</html>
